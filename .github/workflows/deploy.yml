name: Deploy to AKS

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
  workflow_dispatch:

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Validate YAML syntax
        run: |
          for f in k8s/*.yaml k8s/helm/*.yaml k8s/cert-manager/*.yaml; do
            echo "Validating $f..."
            yq e '.' "$f" > /dev/null && echo "OK"
          done

      - name: Scan for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

  deploy:
    name: Deploy to cluster
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Azure login
        run: |
          CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['clientId'])")
          CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['clientSecret'])")
          TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tenantId'])")
          SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['subscriptionId'])")
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" --tenant "$TENANT_ID"
          az account set --subscription "$SUBSCRIPTION_ID"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group lab-rg \
            --name lab-aks \
            --overwrite-existing

      - name: Create ServiceNow secret
        run: |
          kubectl create secret generic servicenow-creds \
            --from-literal=SNOW_URL=https://dev365501.service-now.com \
            --from-literal=SNOW_USER=admin \
            --from-literal=SNOW_PASS="${{ secrets.SNOW_PASS }}" \
            --namespace lab \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Uptime Kuma secret
        run: |
          kubectl create secret generic uptimekuma-creds \
            --from-literal=UPTIME_KUMA_API_KEY="${{ secrets.UPTIME_KUMA_API_KEY }}" \
            --namespace lab \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/networkpolicies.yaml
          kubectl apply -f k8s/mariadb.yaml
          kubectl apply -f k8s/nginx.yaml
          kubectl apply -f k8s/uptimekuma.yaml
          kubectl apply -f k8s/doom.yaml
          kubectl apply -f k8s/doom-dashboard.yaml
          kubectl rollout restart deployment/doom-dashboard -n lab
          kubectl apply -f k8s/grafana-lab-dashboard.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/nginx -n lab --timeout=120s
          kubectl rollout status deployment/mariadb -n lab --timeout=120s
          kubectl rollout status deployment/uptimekuma -n lab --timeout=120s
          kubectl rollout status deployment/doom-dashboard -n lab --timeout=60s

      - name: Configure Uptime Kuma monitors
        run: |
          UK_POD=$(kubectl get pods -n lab -l app=uptimekuma -o jsonpath='{.items[0].metadata.name}')
          python3 << 'PYEOF'
          import subprocess, sys

          UK_POD = subprocess.check_output(
              "kubectl get pods -n lab -l app=uptimekuma -o jsonpath='{.items[0].metadata.name}'",
              shell=True, text=True).strip()

          MONITORS = [
              ("doom.hl0.dev",    "https://doom.hl0.dev"),
              ("grafana.hl0.dev", "https://grafana.hl0.dev"),
              ("test02.hl0.dev",  "https://test02.hl0.dev"),
              ("status.hl0.dev",  "https://status.hl0.dev"),
          ]

          SQL_INSERT = (
              "INSERT INTO monitor("
              "name,type,url,active,interval,retry_interval,maxretries,"
              "user_id,method,accepted_statuscodes_json,maxredirects"
              ") VALUES (?,?,?,1,60,60,1,1,'GET','[\"200-299\"]',10)"
          )

          for name, url in MONITORS:
              check = subprocess.check_output(
                  ["kubectl", "exec", "-n", "lab", UK_POD, "--",
                   "sqlite3", "/app/data/kuma.db",
                   f"SELECT COUNT(*) FROM monitor WHERE name='{name}';"],
                  text=True).strip()
              if check != "0":
                  print(f"  exists:  {name}")
                  continue
              sql = (
                  f"INSERT INTO monitor(name,type,url,active,interval,retry_interval,"
                  f"maxretries,user_id,method,accepted_statuscodes_json,maxredirects) "
                  f"VALUES ('{name}','http','{url}',1,60,60,1,1,'GET','[\"200-299\"]',10);"
              )
              subprocess.run(
                  ["kubectl", "exec", "-n", "lab", UK_POD, "--",
                   "sqlite3", "/app/data/kuma.db", sql],
                  check=True)
              print(f"  created: {name}")
          PYEOF
          kubectl rollout restart deployment/uptimekuma -n lab
          kubectl rollout status deployment/uptimekuma -n lab --timeout=60s

      - name: Create Grafana admin secret
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic grafana-admin \
            --from-literal=admin-user=admin \
            --from-literal=admin-password="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --namespace monitoring \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy monitoring stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          RELEASE_STATUS=$(helm status kube-prometheus-stack -n monitoring 2>/dev/null | grep "STATUS:" | awk '{print $2}' || echo "not-found")
          if [[ "$RELEASE_STATUS" == "failed" || "$RELEASE_STATUS" == "pending-install" || "$RELEASE_STATUS" == "pending-upgrade" ]]; then
            echo "Cleaning up stuck release (status: $RELEASE_STATUS)"
            helm uninstall kube-prometheus-stack -n monitoring 2>/dev/null || true
            sleep 10
          fi
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --values k8s/helm/kube-prometheus-stack-values.yaml \
            --timeout 5m

      - name: Verify monitoring rollout
        run: |
          kubectl rollout status deployment/kube-prometheus-stack-grafana -n monitoring --timeout=300s
          kubectl rollout status deployment/kube-prometheus-stack-kube-state-metrics -n monitoring --timeout=120s
          kubectl rollout status statefulset/prometheus-kube-prometheus-stack-prometheus -n monitoring --timeout=300s

      - name: Deploy Loki stack
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install loki-stack grafana/loki-stack \
            --namespace monitoring \
            --values k8s/helm/loki-stack-values.yaml \
            --timeout 5m
          kubectl rollout status daemonset/loki-stack-promtail -n monitoring --timeout=120s

      - name: Deploy cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --values k8s/helm/cert-manager-values.yaml \
            --timeout 5m \
            --wait

      - name: Configure Cloudflare issuer
        run: |
          kubectl create secret generic cloudflare-api-token \
            --from-literal=api-token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            --namespace cert-manager \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/cert-manager/clusterissuer.yaml

      - name: Deploy NGINX Gateway Fabric
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
          helm upgrade --install nginx-gateway-fabric \
            oci://ghcr.io/nginxinc/charts/nginx-gateway-fabric \
            --namespace nginx-gateway \
            --create-namespace \
            --values k8s/helm/nginx-gateway-fabric-values.yaml \
            --timeout 5m
          kubectl rollout status deployment/nginx-gateway-fabric -n nginx-gateway --timeout=120s

      - name: Update Cloudflare DNS
        run: |
          ZONE_ID="283c74f5bfbbb2a804dabdb938ccde8f"
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"

          for i in $(seq 1 30); do
            INGRESS_IP=$(kubectl get svc nginx-gateway-fabric -n nginx-gateway \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            [ -n "$INGRESS_IP" ] && break
            echo "Waiting for LoadBalancer IP... ($i/30)"
            sleep 10
          done
          echo "Ingress IP: $INGRESS_IP"

          upsert_dns() {
            local name=$1
            local record_id
            record_id=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$name" | \
              python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')")
            if [ -n "$record_id" ]; then
              curl -s -X PATCH \
                -H "Authorization: Bearer $CF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"content\":\"$INGRESS_IP\",\"proxied\":false}" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$record_id" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print('Updated' if d['success'] else d['errors'])"
            else
              curl -s -X POST \
                -H "Authorization: Bearer $CF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"A\",\"name\":\"$name\",\"content\":\"$INGRESS_IP\",\"ttl\":60,\"proxied\":false}" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print('Created' if d['success'] else d['errors'])"
            fi
          }

          if [ -z "$INGRESS_IP" ]; then
            echo "ERROR: LoadBalancer IP not assigned after 5 minutes — check Azure public IP quota"
            exit 1
          fi

          upsert_dns "test02.hl0.dev"
          upsert_dns "grafana.hl0.dev"
          upsert_dns "doom.hl0.dev"
          upsert_dns "status.hl0.dev"

      - name: Apply Gateway API resources
        run: |
          kubectl apply -f k8s/certificates.yaml
          kubectl apply -f k8s/nginx-proxy.yaml
          kubectl apply -f k8s/gateway.yaml

      - name: Show cluster state
        if: always()
        run: |
          kubectl get pods,svc,pvc -n lab
          echo "---"
          kubectl get pods,svc,pvc -n monitoring
          echo "---"
          kubectl get gateway,httproute -A 2>/dev/null || true
          kubectl get certificate -n lab 2>/dev/null || true
          echo "---"
          kubectl get certificate -A 2>/dev/null || true
