<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  {% include mermaid.html %}
</head>
<body>
  <header class="page-header" role="banner">
    <h1 class="project-name">{{ site.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <a href="https://github.com/hermanl0/k8s-test02" class="btn">View on GitHub</a>
  </header>
  <main id="content" class="main-content" role="main">
    {{ content }}
  </main>
  <footer class="site-footer">
    <span class="site-footer-credits">
      Deployed on <a href="https://azure.microsoft.com/en-us/products/kubernetes-service">Azure Kubernetes Service</a> &mdash;
      <a href="https://github.com/hermanl0/k8s-test02">github.com/hermanl0/k8s-test02</a>
    </span>
  </footer>
</body>
</html>
