apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptimekuma-data
  namespace: lab
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: managed-csi
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptimekuma
  namespace: lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptimekuma
  template:
    metadata:
      labels:
        app: uptimekuma
    spec:
      # uptime-kuma uses setpriv to drop to the node user at startup — the
      # RuntimeDefault seccomp profile blocks a syscall Node.js needs.
      # Mitigated by ClusterIP-only exposure and NetworkPolicy.
      containers:
      - name: uptimekuma
        image: louislam/uptime-kuma:1
        ports:
        - containerPort: 3001
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /app/data
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: uptimekuma-data
---
apiVersion: v1
kind: Service
metadata:
  name: uptimekuma
  namespace: lab
spec:
  selector:
    app: uptimekuma
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
