apiVersion: v1
kind: ConfigMap
metadata:
  name: doom-dashboard-nginx
  namespace: lab
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        server_tokens off;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src 'self'; connect-src 'self'" always;

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location /doom/ {
            proxy_pass http://doom:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_hide_header X-Frame-Options;
            proxy_read_timeout 60s;
            # Override server-level headers for the game proxy.
            # Any add_header in a location block replaces ALL server-level
            # add_header directives for that location, so we re-declare what
            # we need and use a permissive CSP that allows WebAssembly.
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self' blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; img-src 'self' blob: data:; connect-src 'self';" always;
        }

        location /metrics-data {
            proxy_pass http://127.0.0.1:9091/metrics-data;
            proxy_read_timeout 6s;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: doom-dashboard-metrics
  namespace: lab
data:
  metrics_server.py: |
    #!/usr/bin/env python3
    import json, time, threading, urllib.request, urllib.parse
    from http.server import BaseHTTPRequestHandler, HTTPServer

    PROM = "http://kube-prometheus-stack-prometheus.monitoring:9090/api/v1/query"

    SCALARS = {
        "cpu":    '100 - avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100',
        "mem":    '(1 - avg(node_memory_MemAvailable_bytes)/avg(node_memory_MemTotal_bytes)) * 100',
        "rps":    'sum(rate(nginx_ingress_controller_requests{ingress="doom-ingress"}[2m])) or vector(0)',
        "hits5m": 'sum(increase(nginx_ingress_controller_requests{ingress="doom-ingress"}[5m])) or vector(0)',
        "hits1h": 'sum(increase(nginx_ingress_controller_requests{ingress="doom-ingress"}[1h])) or vector(0)',
        "pods":   'sum(kube_pod_status_phase{phase="Running"})',
        "nodes":  'count(kube_node_info)',
        "ns":     'count(kube_namespace_labels)',
    }
    INGRESS_Q  = 'sort_desc(sum by (ingress)(rate(nginx_ingress_controller_requests[2m])))'
    PODS_Q     = 'kube_pod_status_phase == 1'

    _cache = {}
    _lock  = threading.Lock()

    def _query(q):
        url = PROM + "?query=" + urllib.parse.quote(q)
        with urllib.request.urlopen(url, timeout=5) as r:
            d = json.load(r)
        if d["status"] != "success":
            return []
        return d["data"]["result"]

    def _fetch():
        out = {}
        for k, q in SCALARS.items():
            try:
                rs = _query(q)
                out[k] = float(rs[0]["value"][1]) if rs else None
            except Exception:
                out[k] = None
        try:
            out["ingress"] = [
                {"ingress": r["metric"].get("ingress", "default"),
                 "rps": float(r["value"][1])}
                for r in _query(INGRESS_Q)
            ]
        except Exception:
            out["ingress"] = []
        try:
            pods_raw = _query(PODS_Q)
            out["pod_list"] = sorted([
                {"ns":    r["metric"].get("namespace", ""),
                 "pod":   r["metric"].get("pod", ""),
                 "phase": r["metric"].get("phase", "")}
                for r in pods_raw
            ], key=lambda x: (x["ns"], x["pod"]))
        except Exception:
            out["pod_list"] = []
        return out

    def _loop():
        while True:
            try:
                data = _fetch()
                with _lock:
                    _cache.clear()
                    _cache.update(data)
                    _cache["ok"] = True
            except Exception as e:
                with _lock:
                    _cache["ok"] = False
                print(f"[metrics] error: {e}", flush=True)
            time.sleep(5)

    class _H(BaseHTTPRequestHandler):
        def log_message(self, *a): pass
        def do_GET(self):
            if self.path != "/metrics-data":
                self.send_response(404)
                self.end_headers()
                return
            with _lock:
                body = json.dumps(dict(_cache)).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

    threading.Thread(target=_loop, daemon=True).start()
    print("[metrics] server starting on 127.0.0.1:9091", flush=True)
    HTTPServer(("127.0.0.1", 9091), _H).serve_forever()
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: doom-dashboard-html
  namespace: lab
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>doom.hl0.dev</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --red:#b81000;--rhi:#ff2200;--amb:#d08000;
          --grn:#00a848;--dim:#484848;--bdr:#202020;
          --bg:#080808;--bg2:#0e0e0e;--bg3:#161616;--tx:#c0c0c0
        }
        html,body{height:100%;background:var(--bg);color:var(--tx);
          font-family:'Courier New',monospace;font-size:16px;overflow:hidden}
        header{
          height:42px;background:var(--bg2);border-bottom:2px solid var(--red);
          display:flex;align-items:center;justify-content:space-between;padding:0 16px;
          flex-shrink:0
        }
        .h-logo{color:var(--rhi);font-weight:bold;letter-spacing:4px;font-size:13px;
          text-shadow:0 0 8px var(--rhi)}
        .h-right{display:flex;align-items:center;gap:18px;font-size:11px;color:var(--dim)}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--grn);
          box-shadow:0 0 6px var(--grn);display:inline-block;margin-right:6px;
          animation:pulse 2s infinite}
        .dot.err{background:var(--rhi);box-shadow:0 0 6px var(--rhi);animation:none}
        .dot.init{background:var(--amb);box-shadow:0 0 6px var(--amb)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

        #layout{display:flex;height:calc(100vh - 42px)}
        #game{flex:1;background:#000;border-right:2px solid var(--bdr);overflow:hidden}
        #game iframe{width:100%;height:100%;border:none;display:block}

        #panel{
          width:460px;min-width:460px;background:var(--bg2);
          display:flex;flex-direction:column;overflow:hidden
        }
        .sec{border-bottom:1px solid var(--bdr);padding:12px 14px;flex-shrink:0}
        .sec-hd{
          font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;
          margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bdr)
        }

        /* resource bars */
        .brow{display:flex;align-items:center;margin-bottom:10px}
        .bl{width:44px;font-size:14px;color:var(--dim)}
        .bt{flex:1;height:10px;background:var(--bg3);margin:0 10px;border:1px solid #1a1a1a;border-radius:2px}
        .bf{height:100%;background:var(--grn);transition:width .6s ease;border-radius:2px}
        .bf.w{background:var(--amb)}.bf.c{background:var(--rhi)}
        .bv{width:46px;text-align:right;font-size:14px;color:var(--tx)}

        /* fleet counters */
        .nums{display:flex;justify-content:space-around;padding:6px 0}
        .nb{text-align:center}
        .nv{font-size:52px;color:var(--amb);line-height:1;
          text-shadow:0 0 12px rgba(208,128,0,.4);font-variant-numeric:tabular-nums}
        .nl{font-size:12px;color:var(--dim);letter-spacing:2px;margin-top:4px}

        /* doom traffic */
        .rrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
        .rl{font-size:14px;color:var(--dim)}
        .rv{font-size:28px;color:var(--amb);text-shadow:0 0 8px rgba(208,128,0,.3);font-variant-numeric:tabular-nums}
        .rv.sm{font-size:20px}
        #spark{display:flex;align-items:flex-end;gap:2px;height:48px;margin-top:10px}
        .sb{flex:1;background:var(--red);min-height:2px;border-radius:1px 1px 0 0;transition:height .4s ease}

        /* pod roster */
        #pod-sec{border-bottom:1px solid var(--bdr);padding:12px 14px;flex:1;overflow-y:auto;min-height:0}
        .pgrp{margin-bottom:10px}
        .pgrp-hd{
          font-size:10px;letter-spacing:2px;text-transform:uppercase;
          display:flex;justify-content:space-between;align-items:center;
          padding-bottom:4px;margin-bottom:4px;border-bottom:1px solid #1c1c1c
        }
        .pgrp-ct{font-size:12px;color:var(--dim)}
        .prow{display:flex;align-items:center;gap:7px;margin-bottom:3px}
        .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
        .pdot.run{background:var(--grn);box-shadow:0 0 4px var(--grn)}
        .pdot.pend{background:var(--amb);box-shadow:0 0 4px var(--amb)}
        .pdot.fail{background:var(--rhi);box-shadow:0 0 4px var(--rhi)}
        .pname{font-size:13px;color:var(--tx);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

        /* ingress */
        .irow{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
        .iname{color:var(--dim);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
        .irps{color:var(--amb);margin-left:10px;flex-shrink:0}

        #footer{padding:8px 14px;font-size:11px;color:#2a2a2a;
          border-top:1px solid var(--bdr);flex-shrink:0}

        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:var(--bg2)}
        ::-webkit-scrollbar-thumb{background:#303030}
      </style>
    </head>
    <body>
    <header>
      <div class="h-logo">&#9760; DOOM &mdash; OPS CENTER</div>
      <div class="h-right">
        <span><span class="dot init" id="dot"></span><span id="sts">INIT</span></span>
        <span id="ts">&mdash;</span>
      </div>
    </header>
    <div id="layout">
      <div id="game">
        <iframe src="/doom/" allowfullscreen title="DOOM"></iframe>
      </div>
      <div id="panel">

        <div class="sec">
          <div class="sec-hd">&#9889; node resources</div>
          <div class="brow">
            <div class="bl">CPU</div>
            <div class="bt"><div class="bf" id="cpu-b" style="width:0"></div></div>
            <div class="bv" id="cpu-v">&mdash;</div>
          </div>
          <div class="brow">
            <div class="bl">MEM</div>
            <div class="bt"><div class="bf" id="mem-b" style="width:0"></div></div>
            <div class="bv" id="mem-v">&mdash;</div>
          </div>
        </div>

        <div class="sec">
          <div class="sec-hd">&#128128; doom traffic</div>
          <div class="rrow"><div class="rl">REQ / SEC</div><div class="rv" id="rps">&mdash;</div></div>
          <div class="rrow"><div class="rl">HITS &middot; 5 MIN</div><div class="rv sm" id="h5">&mdash;</div></div>
          <div class="rrow"><div class="rl">HITS &middot; 1 HR</div><div class="rv sm" id="h1">&mdash;</div></div>
          <div id="spark"></div>
        </div>

        <div class="sec">
          <div class="sec-hd">&#128760; fleet</div>
          <div class="nums">
            <div class="nb"><div class="nv" id="n-p">&mdash;</div><div class="nl">PODS</div></div>
            <div class="nb"><div class="nv" id="n-n">&mdash;</div><div class="nl">NODES</div></div>
            <div class="nb"><div class="nv" id="n-s">&mdash;</div><div class="nl">NS</div></div>
          </div>
        </div>

        <div id="pod-sec">
          <div class="sec-hd" style="margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">&#128187; pod roster</div>
          <div id="pods"><div class="prow"><span class="pname" style="color:#333">loading&hellip;</span></div></div>
        </div>

        <div class="sec" style="flex-shrink:0">
          <div class="sec-hd">&#127760; ingress &middot; req/s</div>
          <div id="ing"><div class="irow"><div class="iname" style="color:#222">loading&hellip;</div></div></div>
        </div>

        <div id="footer">auto-refresh every 5s</div>
      </div>
    </div>
    <script>
      var buf = new Array(26).fill(0);

      var NS_COL = {
        'lab':          '#00a848',
        'monitoring':   '#d08000',
        'ingress-nginx':'#4488ff',
        'cert-manager': '#a040d0',
        'kube-system':  '#484848'
      };
      function nsColor(ns){ return NS_COL[ns]||'#606060'; }

      function shortPod(n){
        var m;
        // Deployment: strip rs-hash (9-10 hex) + pod-hash (4-5 alnum)
        m = n.match(/^(.+)-[a-f0-9]{9,10}-[a-z0-9]{4,5}$/);
        if(m) return m[1];
        // StatefulSet: ends in -\d+
        m = n.match(/^(.+)-(\d+)$/);
        if(m && m[1].length > 2) return m[1]+'-'+m[2];
        // DaemonSet: strip trailing 5-char hash
        m = n.match(/^(.+)-[a-z0-9]{5}$/);
        if(m) return m[1];
        return n;
      }

      function bar(bi,vi,pct){
        var b=document.getElementById(bi);
        b.style.width=pct+'%';
        b.className='bf'+(pct>=85?' c':pct>=65?' w':'');
        document.getElementById(vi).textContent=pct+'%';
      }

      function drawSpark(){
        var el=document.getElementById('spark');
        var mx=Math.max.apply(null,buf.concat([0.0001]));
        el.innerHTML=buf.map(function(v){
          return '<div class="sb" style="height:'+Math.max(2,(v/mx*38)).toFixed(1)+'px"></div>';
        }).join('');
      }

      function renderPods(list){
        if(!list||!list.length){
          document.getElementById('pods').innerHTML='<div class="prow"><span class="pname" style="color:#333">no data</span></div>';
          return;
        }
        var byNs={};
        list.forEach(function(p){ if(!byNs[p.ns]) byNs[p.ns]=[]; byNs[p.ns].push(p); });
        var html='';
        Object.keys(byNs).sort().forEach(function(ns){
          var pods=byNs[ns], col=nsColor(ns);
          html+='<div class="pgrp">';
          html+='<div class="pgrp-hd" style="color:'+col+'"><span>'+ns+'</span><span class="pgrp-ct">'+pods.length+'</span></div>';
          pods.forEach(function(p){
            var dc=p.phase==='Running'?'run':(p.phase==='Pending'?'pend':'fail');
            html+='<div class="prow"><span class="pdot '+dc+'"></span><span class="pname">'+shortPod(p.pod)+'</span></div>';
          });
          html+='</div>';
        });
        document.getElementById('pods').innerHTML=html;
      }

      async function tick(){
        try{
          var d=await fetch('/metrics-data').then(function(r){return r.json();});
          if(d.cpu!=null) bar('cpu-b','cpu-v',Math.round(d.cpu));
          if(d.mem!=null) bar('mem-b','mem-v',Math.round(d.mem));
          var rv=d.rps||0;
          document.getElementById('rps').textContent=rv.toFixed(3)+'/s';
          buf.push(rv);buf.shift();drawSpark();
          document.getElementById('h5').textContent=Math.round(d.hits5m||0);
          document.getElementById('h1').textContent=Math.round(d.hits1h||0);
          if(d.pods!=null) document.getElementById('n-p').textContent=Math.round(d.pods);
          if(d.nodes!=null) document.getElementById('n-n').textContent=Math.round(d.nodes);
          if(d.ns!=null)   document.getElementById('n-s').textContent=Math.round(d.ns);
          renderPods(d.pod_list);
          var ings=d.ingress||[];
          document.getElementById('ing').innerHTML=ings.length
            ?ings.map(function(r){
                return '<div class="irow"><div class="iname">'+(r.ingress||'default')+
                  '</div><div class="irps">'+parseFloat(r.rps).toFixed(3)+'/s</div></div>';
              }).join('')
            :'<div class="irow"><div class="iname" style="color:#333">no traffic yet</div></div>';
          document.getElementById('dot').className='dot';
          document.getElementById('sts').textContent='ONLINE';
          var t=new Date().toLocaleTimeString();
          document.getElementById('ts').textContent=t;
          document.getElementById('footer').textContent='updated '+t+' \xb7 every 5s';
        }catch(e){
          document.getElementById('dot').className='dot err';
          document.getElementById('sts').textContent='ERROR';
          console.error(e);
        }
      }
      drawSpark();tick();setInterval(tick,5000);
    </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doom-dashboard
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doom-dashboard
  template:
    metadata:
      labels:
        app: doom-dashboard
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.27-alpine
        ports:
        - containerPort: 8080
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: html
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        - name: tmp
          mountPath: /tmp
      - name: metrics
        image: python:3.12-alpine
        command: ["python3", "/app/metrics_server.py"]
        env:
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 20m
            memory: 24Mi
          limits:
            cpu: 50m
            memory: 48Mi
        volumeMounts:
        - name: metrics-script
          mountPath: /app
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: doom-dashboard-nginx
      - name: html
        configMap:
          name: doom-dashboard-html
      - name: metrics-script
        configMap:
          name: doom-dashboard-metrics
          defaultMode: 0444
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: doom-dashboard
  namespace: lab
spec:
  selector:
    app: doom-dashboard
  ports:
  - port: 80
    targetPort: 8080
