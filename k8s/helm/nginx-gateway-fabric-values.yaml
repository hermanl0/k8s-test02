service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  loadBalancerIP: 51.124.232.168
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
    service.beta.kubernetes.io/azure-pip-name: ngf-pip

nginxGateway:
  snippetsFilters:
    enable: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  config:
    logging:
      level: info

nginx:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

metrics:
  enable: true
  port: 9113

serviceMonitor:
  enable: true
  labels:
    release: kube-prometheus-stack
