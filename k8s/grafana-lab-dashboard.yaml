            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 13},
          "id": 9,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "Lab — Memory (Working Set)",
          "type": "timeseries",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum by(pod) (container_memory_working_set_bytes{namespace=\"lab\",container!=\"POD\",container!=\"\"})", "legendFormat": "{{pod}}", "refId": "A"}]
