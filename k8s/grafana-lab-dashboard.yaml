            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Nodes",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(kube_node_info)", "legendFormat": "nodes", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Cluster CPU",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "avg(1 - avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100", "legendFormat": "cpu", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Cluster Memory",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "avg(1 - (node_memory_MemAvailable_bytes/node_memory_MemTotal_bytes)) * 100", "legendFormat": "memory", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"mode": "none"}
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 8, "x": 0, "y": 4},
          "id": 5,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "HTTP Requests / s",
          "type": "timeseries",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum by(ingress) (rate(nginx_ingress_controller_requests[5m]))", "legendFormat": "{{ingress}}", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 70,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "normal"}
              },
              "unit": "reqps"
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "2xx"}, "properties": [{"id": "color", "value": {"fixedColor": "#37872d", "mode": "fixed"}}]},
              {"matcher": {"id": "byName", "options": "4xx"}, "properties": [{"id": "color", "value": {"fixedColor": "#e0b400", "mode": "fixed"}}]},
              {"matcher": {"id": "byName", "options": "5xx"}, "properties": [{"id": "color", "value": {"fixedColor": "#c4162a", "mode": "fixed"}}]}
            ]
          },
          "gridPos": {"h": 9, "w": 8, "x": 8, "y": 4},
          "id": 6,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "HTTP Status Codes",
          "type": "timeseries",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"2..\"}[5m]))", "legendFormat": "2xx", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"4..\"}[5m]))", "legendFormat": "4xx", "refId": "B"},
            {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"5..\"}[5m]))", "legendFormat": "5xx", "refId": "C"}
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 8,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"mode": "none"}
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 8, "x": 16, "y": 4},
          "id": 7,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "p99 Response Latency",
          "type": "timeseries",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "histogram_quantile(0.99, sum by(le, ingress) (rate(nginx_ingress_controller_response_duration_seconds_bucket[5m])))", "legendFormat": "{{ingress}} p99", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"mode": "none"}
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 13},
          "id": 8,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "title": "Lab — CPU Cores Used",
          "type": "timeseries",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum by(pod) (rate(container_cpu_usage_seconds_total{namespace=\"lab\",container!=\"POD\",container!=\"\"}[5m]))", "legendFormat": "{{pod}}", "refId": "A"}]
        },
        {
