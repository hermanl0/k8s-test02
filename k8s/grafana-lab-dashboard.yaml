          "transformations": [
            {"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"Value #A": "Restarts", "namespace": "Namespace", "pod": "Pod"}}}
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${loki_ds}"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 37},
          "id": 13,
          "options": {
