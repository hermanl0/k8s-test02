apiVersion: apps/v1
kind: Deployment
metadata:
  name: doom
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doom
  template:
    metadata:
      labels:
        app: doom
    spec:
      containers:
      - name: doom
        image: elliottking/doom-wasm:0.1.1
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: doom
  namespace: lab
spec:
  selector:
    app: doom
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
