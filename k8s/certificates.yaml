apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test02-tls
  namespace: lab
spec:
  secretName: test02-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - test02.hl0.dev
---
