# grafana-tls lives in lab (co-located with the Gateway) even though the
# HTTPRoute and backing service are in the monitoring namespace.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: lab
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - grafana.hl0.dev
